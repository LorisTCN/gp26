<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TecnoGP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #8bac0f; /* Gameboy light green */
            font-family: 'Press Start 2P', cursive;
            overflow: hidden; touch-action: none;
            color: #0f380f; /* Gameboy dark green */
        }
        #gameCanvas {
            display: block; width: 100%; height: 100%;
        }
        /* Interfaccia utente in sovrimpressione */
        .ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(155, 188, 15, 0.95); z-index: 10; text-align: center; padding: 20px; box-sizing: border-box;
        }
        .hidden { display: none !important; }
        h1, p { line-height: 1.5; }
        h1 { font-size: 20px; color: #0f380f; text-shadow: 2px 2px #9bbc0f; margin-bottom: 10px; }
        p { font-size: 10px; margin: 5px 0; }
        
        /* Bottoni Stile Retrò */
        .btn {
            background-color: #0f380f; color: #9bbc0f;
            border: 4px solid #306230; padding: 12px 15px;
            font-family: 'Press Start 2P', cursive; font-size: 12px;
            cursor: pointer; margin: 10px 5px; text-decoration: none; display: inline-block;
        }
        .btn:active { background-color: #306230; }
        .btn-container { margin-top: 15px; }

        /* Controlli Touch Mobile */
        #controls {
            position: absolute; bottom: 20px; left: 0; width: 100%;
            display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box;
            z-index: 5;
        }
        .touch-btn {
            width: 80px; height: 80px; background-color: rgba(15, 56, 15, 0.3);
            border: 4px solid #0f380f; border-radius: 10px;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; color: #0f380f; user-select: none; font-weight: bold;
        }
        #warning {
            position: absolute; top: 20px; left: 0; width: 100%; text-align: center;
            color: #0f380f; font-size: 12px; z-index: 5; animation: blink 0.5s infinite;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="warning" class="hidden">ATTENZIONE: COMANDI INVERTITI!</div>

    <div id="controls" class="hidden">
        <div id="btnLeft" class="touch-btn">&lt;</div>
        <div id="btnRight" class="touch-btn">&gt;</div>
    </div>

    <div id="startScreen" class="ui-layer">
        <h1>GP ROZZANO</h1>
        <p>Usa le frecce per guidare.</p>
        <p>Evita le rocce scure!</p>
        <p>Le bottiglie invertono i comandi!</p>
        
        <div class="btn-container">
            <p style="margin-bottom: 15px; font-size: 12px;">Scegli il livello:</p>
            <button class="btn" onclick="startGame('facile')">FACILE</button>
            <button class="btn" onclick="startGame('difficile')">DIFFICILE</button>
        </div>
    </div>

    <div id="gameOverScreen" class="ui-layer hidden">
        <h1>CRASH!</h1>
        <p>Hai colpito una roccia.</p>
        <div class="btn-container">
            <button class="btn" onclick="showMenu()">MENU</button>
            <button class="btn" onclick="restartGame()">RIPROVA</button>
        </div>
    </div>

    <div id="winScreen" class="ui-layer hidden">
        <h1>COMPLIMENTI!</h1>
        <p style="font-size: 12px; margin: 20px 0; line-height: 1.8;">Ti sei qualificato per il GP che si terrà Sabato 25 Aprile ore 16.45.</p>
        <a href="https://maps.app.goo.gl/87Es3qq8PkCTB2aW7" target="_blank" class="btn">dove?</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Elementi Interfaccia
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winScreen = document.getElementById('winScreen');
        const controls = document.getElementById('controls');
        const warning = document.getElementById('warning');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Variabili di Gioco
        let isPlaying = false;
        let speedMultiplier = 1;
        let baseSpeed = 5; // Aumentata velocità di base
        let frameCount = 0;
        let obstacles = [];
        let roadLines = [];
        let invertedControls = false;
        let invertTimer = 0;
        let currentDifficulty = 'facile'; 
        
        // Variabili per il Traguardo
        let isFinishing = false;
        let finishLineY = -100;
        
        const car = { width: 40, height: 60, x: 0, y: 0, speed: 6, moveLeft: false, moveRight: false };

        const COLOR_DARKEST = '#0f380f';
        const COLOR_DARK = '#306230';
        const COLOR_LIGHT = '#8bac0f';
        const COLOR_LIGHTEST = '#9bbc0f';

        // Setup Controlli
        document.getElementById('btnLeft').addEventListener('touchstart', (e) => { e.preventDefault(); car.moveLeft = true; });
        document.getElementById('btnLeft').addEventListener('touchend', (e) => { e.preventDefault(); car.moveLeft = false; });
        document.getElementById('btnRight').addEventListener('touchstart', (e) => { e.preventDefault(); car.moveRight = true; });
        document.getElementById('btnRight').addEventListener('touchend', (e) => { e.preventDefault(); car.moveRight = false; });
        
        window.addEventListener('keydown', (e) => {
            if(e.key === 'ArrowLeft') car.moveLeft = true;
            if(e.key === 'ArrowRight') car.moveRight = true;
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft') car.moveLeft = false;
            if(e.key === 'ArrowRight') car.moveRight = false;
        });

        function showMenu() {
            gameOverScreen.classList.add('hidden');
            winScreen.classList.add('hidden');
            controls.classList.add('hidden');
            startScreen.classList.remove('hidden');
            warning.classList.add('hidden');
        }

        function restartGame() {
            startGame(currentDifficulty);
        }

        function startGame(difficulty) {
            currentDifficulty = difficulty; 
            
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            winScreen.classList.add('hidden');
            controls.classList.remove('hidden');
            
            car.x = canvas.width / 2 - car.width / 2;
            car.y = canvas.height - 150;
            car.moveLeft = false; car.moveRight = false;
            
            obstacles = [];
            roadLines = [0, canvas.height/3, (canvas.height/3)*2];
            speedMultiplier = 1;
            frameCount = 0;
            invertedControls = false;
            invertTimer = 0;
            isFinishing = false;
            finishLineY = -100;
            warning.classList.add('hidden');
            
            isPlaying = true;
            requestAnimationFrame(update);
        }

        function gameOver() {
            isPlaying = false;
            controls.classList.add('hidden');
            warning.classList.add('hidden');
            gameOverScreen.classList.remove('hidden');
        }

        function winGame() {
            isPlaying = false;
            controls.classList.add('hidden');
            warning.classList.add('hidden');
            winScreen.classList.remove('hidden');
        }

        function update() {
            if (!isPlaying) return;

            frameCount++;
            
            // Inizia la fase di traguardo dopo 2800 frame (circa 46 secondi)
            if (frameCount > 2800 && !isFinishing) { 
                isFinishing = true;
                finishLineY = -80; // Fai spawnare il traguardo da sopra lo schermo
            }

            if (currentDifficulty === 'difficile') {
                speedMultiplier = 1.1 + (frameCount / 800); 
            } else {
                speedMultiplier = 1.1; // Aumentato rispetto al precedente 1 per rendere "Facile" meno noioso
            }
            
            let currentScrollSpeed = baseSpeed * speedMultiplier;

            if (invertTimer > 0) {
                invertTimer--;
                if (invertTimer <= 0) {
                    invertedControls = false;
                    warning.classList.add('hidden');
                }
            }

            let moveL = invertedControls ? car.moveRight : car.moveLeft;
            let moveR = invertedControls ? car.moveLeft : car.moveRight;

            if (moveL && car.x > 10) car.x -= car.speed;
            if (moveR && car.x < canvas.width - car.width - 10) car.x += car.speed;

            // Smette di creare ostacoli se il traguardo è vicino, per lasciare la visuale libera per l'arrivo
            if (!isFinishing) {
                let spawnRate = currentDifficulty === 'difficile' ? (0.02 * speedMultiplier) : 0.015;
                if (Math.random() < spawnRate) {
                    let type = Math.random() > 0.7 ? 'bottle' : 'rock'; 
                    let w = type === 'rock' ? 40 : 20;
                    let h = type === 'rock' ? 40 : 50;
                    
                    let randomX = Math.random() * (canvas.width - w - 20) + 10;
                    
                    obstacles.push({
                        x: randomX,
                        y: -50,
                        width: w, height: h, type: type
                    });
                }
            }

            for(let i=0; i<roadLines.length; i++){
                roadLines[i] += currentScrollSpeed;
                if(roadLines[i] > canvas.height) roadLines[i] = -100;
            }

            ctx.fillStyle = COLOR_LIGHTEST;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = COLOR_DARKEST;
            ctx.fillRect(0, 0, 10, canvas.height);
            ctx.fillRect(canvas.width - 10, 0, 10, canvas.height);

            ctx.fillStyle = COLOR_LIGHT;
            for(let i=0; i<roadLines.length; i++){
                ctx.fillRect(canvas.width/2 - 5, roadLines[i], 10, 80);
            }

            // Disegna Traguardo
            if (isFinishing) {
                finishLineY += currentScrollSpeed;
                let squareSize = 20;
                
                // Disegna due file di scacchi
                for (let row = 0; row < 2; row++) {
                    for (let col = 0; col < canvas.width / squareSize; col++) {
                        ctx.fillStyle = (row + col) % 2 === 0 ? COLOR_DARKEST : COLOR_LIGHTEST;
                        ctx.fillRect(col * squareSize, finishLineY + row * squareSize, squareSize, squareSize);
                    }
                }

                // Vittoria quando la macchina supera la linea
                if (finishLineY > car.y + car.height) {
                    winGame();
                    return;
                }
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.y += currentScrollSpeed;

                if (obs.type === 'rock') {
                    ctx.fillStyle = COLOR_DARKEST;
                    ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
                    ctx.fillStyle = COLOR_DARK;
                    ctx.fillRect(obs.x+5, obs.y+5, obs.width-10, obs.height-10);
                } else {
                    ctx.fillStyle = COLOR_LIGHT; 
                    ctx.fillRect(obs.x, obs.y+10, obs.width, obs.height-10);
                    ctx.fillRect(obs.x+5, obs.y, obs.width-10, 10); 
                    ctx.fillStyle = COLOR_DARKEST; 
                    ctx.fillRect(obs.x, obs.y+20, obs.width, 15);
                }

                let hitboxMargin = 5;
                if (car.x < obs.x + obs.width - hitboxMargin && 
                    car.x + car.width > obs.x + hitboxMargin &&
                    car.y < obs.y + obs.height - hitboxMargin && 
                    car.y + car.height > obs.y + hitboxMargin) {
                    
                    if (obs.type === 'rock') {
                        gameOver();
                        return;
                    } else if (obs.type === 'bottle') {
                        invertedControls = true;
                        invertTimer = 240; 
                        warning.classList.remove('hidden');
                        obstacles.splice(i, 1); 
                        continue;
                    }
                }

                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                }
            }

            // Disegna Macchina (va disegnata alla fine così passa "sopra" il traguardo)
            ctx.fillStyle = COLOR_DARKEST;
            ctx.fillRect(car.x, car.y, car.width, car.height); 
            ctx.fillStyle = COLOR_LIGHTEST;
            ctx.fillRect(car.x + 5, car.y + 15, car.width - 10, 15); 
            ctx.fillRect(car.x + 5, car.y + 45, car.width - 10, 10); 
            ctx.fillStyle = COLOR_DARK;
            ctx.fillRect(car.x - 4, car.y + 5, 4, 15);
            ctx.fillRect(car.x + car.width, car.y + 5, 4, 15);
            ctx.fillRect(car.x - 4, car.y + 40, 4, 15);
            ctx.fillRect(car.x + car.width, car.y + 40, 4, 15);

            requestAnimationFrame(update);
        }
    </script>
</body>
</html>
